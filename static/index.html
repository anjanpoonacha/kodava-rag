<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kodava Takk</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #FAFAF8;
      color: #1A1A1A;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    .chat-col {
      flex: 62;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #E5E2DC;
      overflow: hidden;
    }

    .context-col {
      flex: 38;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Thread ── */
    .thread {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .exchange { display: flex; flex-direction: column; gap: 8px; }

    /* User bubble */
    .user-bubble {
      align-self: flex-end;
      max-width: 72%;
      background: #F0EDE8;
      border-radius: 16px 16px 4px 16px;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* Assistant bubble */
    .assistant-bubble {
      align-self: flex-start;
      width: 100%;
      background: #fff;
      border: 1px solid #E5E2DC;
      border-left: 3px solid #B5763A;
      border-radius: 4px 12px 12px 12px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    .bubble-label {
      font-size: 11px;
      color: #AAA;
      margin-bottom: 8px;
      letter-spacing: 0.03em;
    }

    /* Markdown content */
    .md-content { font-size: 14px; line-height: 1.7; }
    .md-content p { margin-bottom: 8px; }
    .md-content p:last-child { margin-bottom: 0; }
    .md-content strong { color: #1A1A1A; font-size: 15px; }
    .md-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
      font-size: 13px;
    }
    .md-content th {
      text-align: left;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: #F7F4F0;
      border-bottom: 1px solid #E5E2DC;
    }
    .md-content td {
      padding: 6px 10px;
      border-bottom: 1px solid #F0EDE8;
      vertical-align: top;
    }
    .md-content tr:last-child td { border-bottom: none; }
    .md-content tr:nth-child(even) td { background: #FDFCFB; }
    .md-content blockquote {
      border-left: 3px solid #B5763A;
      margin: 10px 0;
      padding: 6px 12px;
      background: #FDF6F0;
      border-radius: 0 4px 4px 0;
      font-size: 13px;
      color: #555;
    }
    .md-content code {
      background: #F0EDE8;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 13px;
      font-family: monospace;
    }
    .md-content ul, .md-content ol { padding-left: 20px; margin-bottom: 8px; }
    .md-content li { margin-bottom: 3px; }

    /* Action row */
    .action-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding-left: 4px;
    }

    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      padding: 2px 4px;
      border-radius: 3px;
      line-height: 1.4;
      transition: opacity 0.15s;
    }
    .action-btn:hover { opacity: 0.7; text-decoration: underline; }
    .action-btn.approve { color: #6B9E7A; }
    .action-btn.correct { color: #B5763A; }
    .action-btn.reject  { color: #B06060; }
    .action-sep { color: #CCC; font-size: 11px; user-select: none; }

    /* Status label */
    .status-label {
      font-size: 11px;
      padding-left: 4px;
    }
    .status-label.approved { color: #6B9E7A; }
    .status-label.corrected { color: #B5763A; }
    .status-label.rejected  { color: #B06060; }
    .status-label.error     { color: #B06060; }

    .pr-link {
      font-size: 11px;
      padding-left: 4px;
      color: #5A7BBF;
    }
    .pr-link a { color: inherit; text-decoration: underline; }
    .pr-link a:hover { color: #3D5A99; }

    /* Correction form */
    .correction-form {
      background: #FDF6F0;
      border: 1px solid #E8D5C0;
      border-radius: 8px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tab-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: none;
      border: 1px solid #E5E2DC;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
      cursor: pointer;
      color: #888;
      transition: all 0.15s;
    }
    .tab-btn.active {
      border-color: #B5763A;
      color: #B5763A;
      background: #FFF8F3;
    }

    .correction-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #E5E2DC;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      resize: vertical;
      min-height: 36px;
    }
    .correction-input:focus { outline: none; border-color: #B5763A; }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn-cancel {
      background: none;
      border: 1px solid #E5E2DC;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      color: #888;
    }
    .btn-submit {
      background: #B5763A;
      border: none;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
    }
    .btn-submit:hover { background: #9D6330; }

    /* Loading */
    .loading-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    .dot-pulse {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .dot-pulse span {
      width: 6px; height: 6px;
      background: #B5763A;
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1);   }
    }

    /* Script selector bar */
    .script-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-top: 1px solid #F0EDE8;
      background: #fff;
      flex-wrap: wrap;
    }
    .script-label {
      font-size: 11px;
      color: #AAA;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .script-btn {
      background: none;
      border: 1px solid #E5E2DC;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      cursor: pointer;
      color: #888;
      transition: all 0.15s;
    }
    .script-btn.active {
      border-color: #B5763A;
      color: #B5763A;
      background: #FFF8F3;
    }

    /* Input bar */
    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #E5E2DC;
      background: #fff;
    }

    .input-field {
      flex: 1;
      padding: 9px 14px;
      border: 1px solid #E5E2DC;
      border-radius: 14px;
      font-size: 14px;
      font-family: inherit;
      background: #FAFAF8;
      transition: border-color 0.15s;
      resize: none;
      overflow-y: hidden;
      max-height: 120px;
      line-height: 1.5;
      display: block;
    }
    .input-field:focus { outline: none; border-color: #B5763A; }

    .send-btn {
      padding: 9px 20px;
      background: #B5763A;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .send-btn:hover { background: #9D6330; }
    .send-btn:disabled { background: #D4B89A; cursor: not-allowed; }
    .send-btn.stop-btn { background: #B06060; }
    .send-btn.stop-btn:hover { background: #963E3E; }

    /* ── Context panel ── */
    .context-header {
      padding: 14px 16px;
      border-bottom: 1px solid #E5E2DC;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    .context-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .context-empty {
      color: #BBB;
      font-size: 13px;
      text-align: center;
      padding: 32px 16px;
      line-height: 1.6;
    }

    .context-card {
      background: #fff;
      border: 1px solid #E5E2DC;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .card-kodava { font-size: 14px; font-weight: 600; color: #1A1A1A; }
    .card-kannada { font-size: 15px; color: #333; }
    .card-english { font-size: 12px; color: #777; }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
    }

    .confidence-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .confidence-badge.verified    { color: #2D7A4F; background: #EAF4EF; }
    .confidence-badge.audio_source { color: #B5763A; background: #FDF0E5; }
    .confidence-badge.textbook    { color: #888;    background: #F0EEEB; }
    .confidence-badge.unverified  { color: #AAA;    background: #F5F5F5; }

    .card-source { font-size: 10px; color: #BBB; }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      .chat-col { flex: none; height: 65vh; border-right: none; border-bottom: 1px solid #E5E2DC; }
      .context-col { flex: none; height: 35vh; }
    }
  </style>
</head>
<body x-data="chatApp()">

  <div class="layout">

    <!-- Chat column -->
    <div class="chat-col">
      <div class="thread" x-ref="thread">

        <template x-for="ex in exchanges" :key="ex.id">
          <div class="exchange">

            <!-- User bubble -->
            <div class="user-bubble" x-text="ex.query"></div>

            <!-- Assistant bubble -->
            <div class="assistant-bubble">
              <div class="bubble-label">Kodava Takk</div>
              <div class="md-content" x-html="renderMd(ex.answer)"></div>
            </div>

            <!-- Action row / status / correction form -->
            <div>
              <!-- Pending: show action buttons -->
              <div class="action-row" x-show="ex.status === null && correctingId !== ex.id">
                <button class="action-btn approve" @click="submitFeedback(ex, 'approved')">approve</button>
                <span class="action-sep">·</span>
                <button class="action-btn correct" @click="startCorrection(ex.id)">correct</button>
                <span class="action-sep">·</span>
                <button class="action-btn reject"  @click="submitFeedback(ex, 'rejected')">reject</button>
              </div>

              <!-- Correction form -->
              <div class="correction-form" x-show="correctingId === ex.id">
                <div class="tab-row">
                  <template x-for="tab in correctionTabs" :key="tab.key">
                    <button
                      class="tab-btn"
                      :class="{ active: correctionTab === tab.key }"
                      @click="correctionTab = tab.key"
                      x-text="tab.label">
                    </button>
                  </template>
                </div>
                <textarea
                  class="correction-input"
                  rows="2"
                  x-model="correctionText"
                  :placeholder="activePlaceholder">
                </textarea>
                <div class="form-actions">
                  <button class="btn-cancel" @click="cancelCorrection()">cancel</button>
                  <button class="btn-submit" @click="submitCorrection(ex)">submit</button>
                </div>
              </div>

              <!-- Status label after action -->
              <div x-show="ex.status !== null">
                <span class="status-label" :class="ex.status">
                  <span x-show="ex.status === 'approved'">staged for review</span>
                  <span x-show="ex.status === 'rejected'">noted</span>
                  <span x-show="ex.status === 'corrected'">
                    staged: <em x-text="ex.correction"></em>
                  </span>
                  <span x-show="ex.status === 'duplicate'">already in corpus</span>
                  <span x-show="ex.status === 'error'">could not save — try again</span>
                </span>
                <span class="pr-link" x-show="ex.pr_url">
                  <a :href="ex.pr_url" target="_blank" rel="noopener">view PR</a>
                </span>
              </div>
            </div>

          </div>
        </template>

        <!-- Loading indicator -->
        <div class="loading-row" x-show="loading">
          <div class="dot-pulse">
            <span></span><span></span><span></span>
          </div>
        </div>

      </div>

      <!-- Script preference bar -->
      <div class="script-bar">
        <span class="script-label">Script</span>
        <template x-for="opt in scriptOptions" :key="opt.key">
          <button
            class="script-btn"
            :class="{ active: scriptPref === opt.key }"
            @click="scriptPref = (scriptPref === opt.key ? null : opt.key)"
            x-text="opt.label">
          </button>
        </template>
      </div>

      <!-- Input bar -->
      <div class="input-bar">
        <textarea
          class="input-field"
          rows="1"
          x-ref="inputEl"
          x-model="input"
          @keydown="handleEnter($event)"
          @input="autoResize($refs.inputEl)"
          placeholder="Ask about Kodava takk… (Shift+Enter for newline)"
          :disabled="loading"
        ></textarea>
        <button
          class="send-btn"
          :class="{ 'stop-btn': loading }"
          @click="loading ? abort() : send()"
          :disabled="!loading && !input.trim()"
          x-text="loading ? 'Stop' : 'Send'">
        </button>
      </div>
    </div>

    <!-- Context column -->
    <div class="context-col">
      <div class="context-header">Retrieved context</div>
      <div class="context-scroll">

        <div class="context-empty" x-show="lastContext.length === 0">
          Context from the corpus appears here after your first question.
        </div>

        <template x-for="(item, i) in lastContext" :key="i">
          <div class="context-card">
            <div class="card-top">
              <span class="card-kodava" x-text="item.kodava || item.correct || item.suffix || ''"></span>
              <span
                class="confidence-badge"
                :class="item.confidence || 'unverified'"
                x-text="item.confidence || 'unverified'">
              </span>
            </div>
            <div class="card-kannada" x-show="item.kannada" x-text="item.kannada"></div>
            <div class="card-english" x-text="item.english || item.meaning || item.wrong || ''"></div>
            <div class="card-footer">
              <span class="card-source" x-text="item.source || ''"></span>
            </div>
          </div>
        </template>

      </div>
    </div>

  </div>

  <script>
    marked.setOptions({ breaks: true, gfm: true });

    function chatApp() {
      return {
        input: '',
        loading: false,
        exchanges: [],
        correctingId: null,
        correctionTab: 'kodava',
        correctionText: '',
        scriptPref: null,
        _abort: null,

        scriptOptions: [
          { key: 'roman',    label: 'English' },
          { key: 'kannada',  label: 'Kannada ಕ' },
          { key: 'devanagari', label: 'Devanagari' },
          { key: 'all',      label: 'All scripts' },
        ],

        correctionTabs: [
          { key: 'kodava',   label: 'Kodava form',    placeholder: 'corrected romanized form...' },
          { key: 'kannada',  label: 'Kannada script', placeholder: 'ಕನ್ನಡ ಲಿಪಿ...' },
          { key: 'grammar',  label: 'Grammar rule',   placeholder: 'describe the rule...' },
          { key: 'other',    label: 'Other',          placeholder: 'describe what\'s wrong...' },
        ],

        get activePlaceholder() {
          const tab = this.correctionTabs.find(t => t.key === this.correctionTab);
          return tab ? tab.placeholder : '';
        },

        get lastContext() {
          if (!this.exchanges.length) return [];
          return this.exchanges[this.exchanges.length - 1].context || [];
        },

        handleEnter(e) {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            this.send();
          }
        },

        autoResize(el) {
          el.style.height = 'auto';
          el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        },

        async send() {
          const q = this.input.trim();
          if (!q || this.loading) return;
          this.input = '';
          this.$nextTick(() => {
            if (this.$refs.inputEl) this.$refs.inputEl.style.height = 'auto';
          });
          this.loading = true;
          this._abort = new AbortController();

          const idx = this.exchanges.length;
          this.exchanges.push({
            id: Date.now(),
            query: q,
            answer: '',
            context: [],
            status: null,
            correction: null,
            pr_url: null,
          });
          this.$nextTick(() => this.scrollToBottom());

          // Build multi-turn history from the last 6 completed exchanges.
          const history = this.exchanges
            .slice(0, idx)
            .filter(e => e.answer && e.answer.length > 0)
            .slice(-6)
            .flatMap(e => [
              { role: 'user',      content: e.query  },
              { role: 'assistant', content: e.answer },
            ]);

          const body = { q };
          if (history.length) body.history = history;
          if (this.scriptPref)  body.script  = this.scriptPref;

          try {
            const res = await fetch('/agent/stream', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
              signal: this._abort.signal,
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const reader = res.body.getReader();
            const dec = new TextDecoder();
            let buf = '';

            outer: while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              buf += dec.decode(value, { stream: true });
              const lines = buf.split('\n');
              buf = lines.pop(); // keep any incomplete trailing line
              for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const payload = line.slice(6).trim();
                if (payload === '[DONE]') break outer;
                const msg = JSON.parse(payload);
                if (msg.token !== undefined) {
                  this.exchanges[idx].answer += msg.token;
                  this.$nextTick(() => this.scrollToBottom());
                } else if (msg.context !== undefined) {
                  this.exchanges[idx].context = msg.context;
                }
              }
            }
          } catch (e) {
            if (e.name !== 'AbortError') {
              this.exchanges[idx].answer =
                (this.exchanges[idx].answer || '') +
                '\n\n_Error reaching the server. Is the API running?_';
            }
          } finally {
            this._abort = null;
            this.loading = false;
            this.$nextTick(() => this.scrollToBottom());
          }
        },

        abort() {
          if (this._abort) this._abort.abort();
        },

        async submitFeedback(ex, status, correction = null, correctionType = null) {
          const idx = this.exchanges.findIndex(e => e.id === ex.id);
          if (idx !== -1) {
            this.exchanges[idx] = { ...this.exchanges[idx], status, correction, pr_url: null };
          }
          try {
            const res = await fetch('/feedback', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                query:           ex.query,
                answer:          ex.answer,
                correction:      correction,
                correction_type: correctionType,
                status:          status,
              }),
            });
            const data = await res.json();
            if (idx !== -1) {
              if (data.duplicate) {
                this.exchanges[idx] = { ...this.exchanges[idx], status: 'duplicate', pr_url: null };
              } else if (data.pr_url) {
                this.exchanges[idx] = { ...this.exchanges[idx], pr_url: data.pr_url };
              }
            }
          } catch (_) {
            if (idx !== -1) {
              this.exchanges[idx] = { ...this.exchanges[idx], status: 'error' };
            }
          }
        },

        startCorrection(id) {
          this.correctingId   = id;
          this.correctionTab  = 'kodava';
          this.correctionText = '';
        },

        cancelCorrection() {
          this.correctingId   = null;
          this.correctionText = '';
        },

        async submitCorrection(ex) {
          const text = this.correctionText.trim();
          if (!text) return;
          const type = this.correctionTab;
          this.cancelCorrection();
          await this.submitFeedback(ex, 'corrected', text, type);
        },

        renderMd(text) {
          return text ? marked.parse(text) : '';
        },

        scrollToBottom() {
          const el = this.$refs.thread;
          if (el) el.scrollTop = el.scrollHeight;
        },
      };
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
