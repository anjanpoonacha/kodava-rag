# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# Kodava RAG — LLM response quality eval
#
# Usage:
#   promptfoo eval                                     # full suite
#   promptfoo eval --filter-pattern "house"            # single test by keyword
#   promptfoo eval --no-cache                          # force fresh API calls
#   PROMPTFOO_CACHE_ENABLED=false promptfoo eval       # CI mode

description: "Kodava RAG — LLM response quality"

evaluateOptions:
  maxConcurrency: 8

providers:
  - file://configs/rag-provider.yaml

prompts:
  - "{{query}}"

defaultTest: file://configs/grader.yaml

# ── Test suites ───────────────────────────────────────────────────────────────
# Add new regressions to tests/llm/tdd.yaml first; graduate once green.
tests:
  - file://tests/llm/corpus_guard.yaml
  - file://tests/llm/format.yaml
  - file://tests/llm/vocabulary.yaml
  - file://tests/llm/script.yaml
  - file://tests/llm/confidence.yaml
  - file://tests/llm/composition.yaml
  - file://tests/llm/tdd.yaml
