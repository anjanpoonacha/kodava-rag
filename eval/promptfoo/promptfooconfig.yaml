# Promptfoo evaluation config for Kodava RAG
#
# Usage:
#   cd eval/promptfoo
#   promptfoo eval                        # run all tests (uses disk cache)
#   promptfoo eval --no-cache             # force fresh API calls
#   promptfoo view                        # open web UI
#   PROMPTFOO_CACHE_ENABLED=false promptfoo eval  # disable cache (CI)

description: "Kodava RAG — LLM response quality eval"

# ── Runtime ───────────────────────────────────────────────────────────────────
evaluateOptions:
  maxConcurrency: 8   # default is 4; proxy handles parallel connections fine

# ── Providers ─────────────────────────────────────────────────────────────────
providers:
  - id: "file://provider.py:call_api"
    label: "RAG (retrieve + Claude)"

prompts:
  - "{{query}}"

# ── Grader ────────────────────────────────────────────────────────────────────
# Built-in Anthropic provider — no Python subprocess overhead for grading.
# apiBaseUrl trailing slash: SDK appends 'v1/messages' as a relative path,
# preserving the /anthropic prefix required by the Local Hai proxy.
# Env vars resolved from eval/promptfoo/.env via nunjucks {{ env.VAR }}.
defaultTest:
  options:
    provider:
      id: anthropic:messages:claude-haiku-4-5
      config:
        apiKey: "{{ env.ANTHROPIC_API_KEY }}"
        apiBaseUrl: "{{ env.ANTHROPIC_BASE_URL_GRADER }}"

# ── Reusable assertion templates ($ref anchors) ───────────────────────────────
assertionTemplates:

  # Guard: response must say "not in the corpus" for unknown vocabulary
  corpusGuard:
    type: icontains
    value: "not in the corpus"

  # Format: at least one **bolded** term present
  hasBold:
    type: regex
    value: '\*\*\S.*?\*\*'

  # Format: markdown table rows present
  hasTable:
    type: regex
    value: '\|.+\|'

  # Script: Kannada Unicode characters present
  hasKannada:
    type: regex
    value: '[\u0C80-\u0CFF]'

  # Script: Devanagari Unicode characters present
  hasDevanagari:
    type: regex
    value: '[\u0900-\u097F]'

# ── Tests ─────────────────────────────────────────────────────────────────────
tests:

  # ── SUITE 1: Missing vocabulary guard ────────────────────────────────────────

  - description: "Unknown word — must refuse to fabricate"
    vars:
      query: "What is the Kodava word for helicopter?"
    assert:
      - $ref: "#/assertionTemplates/corpusGuard"

  - description: "Unknown domain (planets) — must refuse"
    vars:
      query: "How do I say Jupiter in Kodava?"
    assert:
      - $ref: "#/assertionTemplates/corpusGuard"
      - type: llm-rubric
        value: "Response does not invent a Kodava translation for Jupiter"
        threshold: 0.9

  - description: "No borrowed vocabulary — must not substitute Hindi/Urdu"
    vars:
      query: "What is the Kodava word for hospital?"
    assert:
      - $ref: "#/assertionTemplates/corpusGuard"
      - type: llm-rubric
        value: "Response does not substitute a Hindi, Urdu, or Kannada loanword as authentic Kodava vocabulary"
        threshold: 0.9

  # ── SUITE 2: Format compliance ────────────────────────────────────────────────

  - description: "Vocabulary answer — Kodava word is bolded"
    vars:
      query: "What is the Kodava word for house?"
    assert:
      - $ref: "#/assertionTemplates/hasBold"
      - type: icontains
        value: "mane"

  - description: "Script rendering — Kannada script accompanies Kodava word"
    vars:
      query: "What is the Kodava word for house? Show me the Kannada script."
    assert:
      - $ref: "#/assertionTemplates/hasKannada"
      - type: icontains
        value: "mane"

  - description: "Table format for word-by-word breakdown"
    vars:
      query: "Break down the sentence 'naan sante'k poanê' word by word"
    assert:
      - $ref: "#/assertionTemplates/hasTable"
      - type: icontains
        value: "naan"
      - type: icontains
        value: "sante"

  # ── SUITE 3: Corpus-grounded answers ──────────────────────────────────────────

  - description: "Core vocabulary — water (neer/niir)"
    vars:
      query: "How do you say water in Kodava?"
    assert:
      - type: llm-rubric
        value: "Response gives the Kodava word for water — neer or niir (same word, alternate romanizations)"
        threshold: 0.9

  - description: "Core vocabulary — house (mane)"
    vars:
      query: "What is the Kodava word for home?"
    assert:
      - type: icontains
        value: "mane"

  - description: "Greeting — namaskara"
    vars:
      query: "How do I greet someone in Kodava?"
    assert:
      - type: icontains
        value: "namaskara"

  - description: "Past tense sentence — naan poanê"
    vars:
      query: "How do I say 'I went' in Kodava?"
    assert:
      - type: icontains
        value: "naan"
      - type: icontains
        value: "poan"

  - description: "Dative suffix — sante'k"
    vars:
      query: "How do I say 'to the market' in Kodava?"
    assert:
      - type: icontains
        value: "sante"
      - type: icontains
        value: "'k"

  - description: "Hungry — kela baip'w not hasi"
    vars:
      query: "I am hungry."
    assert:
      - type: icontains
        value: "kela"
      - type: icontains
        value: "baip"
      - type: llm-rubric
        value: "Response uses 'kela baip'w' or 'kela baichaind'und' for 'I am hungry' and does NOT use 'hasi' as the word for hunger"
        threshold: 0.9

  - description: "Numbers 1-10 — ondh through pathth"
    vars:
      query: "I want the numbers from 1 to 10."
    assert:
      - type: icontains
        value: "ondh"
      - type: icontains
        value: "pathth"
      - type: llm-rubric
        value: "Response lists Kodava numbers from 1 to 10 with their romanized forms (ondh=1, dhand=2, muundh=3, naal=4, anjii=5, aar=6, eeL=7, ett=8, woyimbadh=9, pathth=10)"
        threshold: 0.8

  # ── SUITE 4: Confidence flags ─────────────────────────────────────────────────
  # Note: 🟡 flag presence is tested structurally in eval/baseline.py
  # (confidence re-ranking + field presence). The LLM-level test below uses
  # ⚠️ which fires on unverified derivations the model constructs at runtime.

  - description: "Unverified derivation — ⚠️ flag on constructed forms"
    vars:
      query: "How do you say 'I am cooking' in Kodava?"
    assert:
      - type: llm-rubric
        value: "Response either says the phrase is not in the corpus, or if it attempts to construct the phrase it includes a ⚠️ flag indicating the form is unverified"
        threshold: 0.8

  # ── SUITE 5: Script derivation ────────────────────────────────────────────────

  - description: "LL phoneme — Kannada ಳ character present"
    vars:
      query: "How is the LL sound written in Kannada script?"
    assert:
      - type: icontains
        value: "ಳ"

  - description: "Kannada-script query — ಮನೆ ಎಂದರೇನು?"
    vars:
      query: "ಮನೆ ಎಂದರೇನು?"
    assert:
      - type: icontains
        value: "mane"
      - $ref: "#/assertionTemplates/hasKannada"

  - description: "Hindi/Devanagari script — days of the week request"
    vars:
      query: "What are the days of the week in Kodava? I want it in Hindi script."
    assert:
      - $ref: "#/assertionTemplates/hasDevanagari"
      - type: icontains
        value: "naaraache"
      - type: llm-rubric
        value: "Response shows Kodava day names (at least Sunday and Monday) with Devanagari/Hindi script forms alongside the romanized Kodava forms"
        threshold: 0.8

  - description: "Hindi script — terse days-of-week query with script request"
    vars:
      query: "days of the week, i want it in Hindi script"
    assert:
      - $ref: "#/assertionTemplates/hasDevanagari"
      - type: icontains
        value: "naaraache"
      - type: llm-rubric
        value: "Response shows all seven Kodava day names with their Devanagari (Hindi script) forms in a table"
        threshold: 0.8

  # ── SUITE 6: Response completeness ───────────────────────────────────────────

  - description: "Pronoun table — naan and niin present"
    vars:
      query: "What are the pronouns in Kodava — first, second, and third person?"
    assert:
      - type: icontains
        value: "naan"
      - type: icontains
        value: "niin"

  - description: "Conciseness — morning answer under 1200 chars"
    vars:
      query: "What is the Kodava word for morning?"
    assert:
      - type: javascript
        value: "output.length < 1200"
      - type: icontains
        value: "polaaka"

  # ── SUITE 7: RAG-specific quality (context faithfulness) ─────────────────────

  - description: "Context faithfulness — answer grounded in retrieved corpus"
    vars:
      query: "How do I say 'I went to the market' in Kodava?"
    assert:
      - type: icontains
        value: "sante"
      - type: context-faithfulness
        contextTransform: "JSON.stringify(context.metadata?.context ?? [])"
        threshold: 0.6

  # ── SUITE 8: Branch-specific capabilities ────────────────────────────────────

  - description: "Kannada-script query resolves (Kannada in BM25 index)"
    vars:
      query: "ಮನೆ ಅಂದ್ರೆ ಏನು Kodava ಅಲ್ಲಿ?"
    assert:
      - type: icontains
        value: "mane"
      - $ref: "#/assertionTemplates/hasKannada"

  - description: "LL phoneme — Kannada ಳ character in answer"
    vars:
      query: "What does the phoneme LL map to in Kannada script?"
    assert:
      - type: icontains
        value: "ಳ"

  # ── SUITE 9: Paragraph composition capability ────────────────────────────────

  - description: "Paragraph — daily routine mentor text with pinynya"
    vars:
      query: "Write a paragraph about my daily routine in Kodava."
    assert:
      - type: icontains
        value: "pinynya"
      - type: icontains
        value: "palaaka"
      - type: llm-rubric
        value: "Response shows a connected Kodava passage of at least 3 sentences about a daily routine, using the connective pinynya (then/next), and presents it as a mentor text the learner can study and adapt"
        threshold: 0.8

  - description: "Paragraph — market passage with serii and sentence frame"
    vars:
      query: "I want to practice writing a paragraph about going to the market in Kodava."
    assert:
      - type: icontains
        value: "serii"
      - type: llm-rubric
        value: "Response includes a Kodava market passage or sentence frame scaffold that the learner can use to practice composition, with at least one sentence containing verified Kodava vocabulary for market or shopping"
        threshold: 0.8

  - description: "Paragraph — connective pinynya used correctly in multi-sentence output"
    vars:
      query: "Show me how to use pinynya in a short Kodava paragraph."
    assert:
      - type: icontains
        value: "pinynya"
      - type: llm-rubric
        value: "Response shows at least two Kodava sentences connected by pinynya (then/after that/next), with English gloss for each sentence"
        threshold: 0.8
