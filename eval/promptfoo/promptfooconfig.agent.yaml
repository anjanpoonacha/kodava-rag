# Agent eval — SearchingExpert tool-use loop quality.
#
# These tests verify behaviours that require the agent layer:
#   • Query reformulation (natural language → keyword)
#   • Collection targeting (vocabulary vs grammar_rules vs phonemes)
#   • Retry on thin results
#   • Final answer faithfulness after multi-call retrieval
#
# Usage:
#   cd eval/promptfoo
#   promptfoo eval --config promptfooconfig.agent.yaml
#   promptfoo eval --config promptfooconfig.agent.yaml --filter-description "morning"

description: "Kodava RAG — SearchingExpert agent eval"

evaluateOptions:
  maxConcurrency: 4

providers:
  - id: "file://provider.py:call_agent"
    label: "SearchingExpert agent"

prompts:
  - "{{query}}"

defaultTest:
  options:
    provider:
      id: anthropic:messages:claude-haiku-4-5
      config:
        apiKey: "{{ env.ANTHROPIC_API_KEY }}"
        apiBaseUrl: "{{ env.ANTHROPIC_BASE_URL_GRADER }}"

# ── Reusable assertion templates ─────────────────────────────────────────────
assertionTemplates:

  corpusGuard:
    type: icontains
    value: "not in the corpus"

  hasBold:
    type: regex
    value: '\*\*\S.*?\*\*'

  hasKannada:
    type: regex
    value: '[\u0C80-\u0CFF]'

  hasDevanagari:
    type: regex
    value: '[\u0900-\u097F]'

  # Agent made at least one search call
  didSearch:
    type: javascript
    value: "context.metadata?.search_calls?.length >= 1"

# ── Tests ─────────────────────────────────────────────────────────────────────
tests:

  # ── SUITE A: Query reformulation ─────────────────────────────────────────────
  # Natural-language questions whose raw form scores poorly against BM25;
  # the agent must reformulate before retrieval succeeds.

  - description: "Reformulation — 'how do I say good morning' finds polaaka"
    vars:
      query: "How do I say good morning in Kodava?"
    assert:
      - $ref: "#/assertionTemplates/didSearch"
      - type: icontains
        value: "polaaka"
      - type: llm-rubric
        value: "Response gives a Kodava morning greeting (polaaka or nallé polaaka)"
        threshold: 0.9

  - description: "Reformulation — 'what is the word for a dwelling place' finds mane"
    vars:
      query: "What is the Kodava word for a dwelling place?"
    assert:
      - $ref: "#/assertionTemplates/didSearch"
      - type: icontains
        value: "mane"

  - description: "Reformulation — 'how do people greet each other' finds namaskara"
    vars:
      query: "How do Kodava people greet each other?"
    assert:
      - $ref: "#/assertionTemplates/didSearch"
      - type: icontains
        value: "namaskara"

  # ── SUITE B: Collection targeting ────────────────────────────────────────────
  # Agent should target the right collection rather than searching all blindly.

  - description: "Collection targeting — script question hits phonemes"
    vars:
      query: "How is the LL sound written in Kannada script?"
    assert:
      - $ref: "#/assertionTemplates/didSearch"
      - type: icontains
        value: "ಳ"
      - type: javascript
        value: >
          context.metadata?.search_calls?.some(c => c.collection === 'phonemes')

  - description: "Collection targeting — grammar correction hits grammar_rules"
    vars:
      query: "What is the correct past tense suffix in Kodava?"
    assert:
      - $ref: "#/assertionTemplates/didSearch"
      - type: javascript
        value: >
          context.metadata?.search_calls?.some(
            c => c.collection === 'grammar_rules' || c.collection === null
          )
      - type: llm-rubric
        value: "Response addresses past tense formation in Kodava"
        threshold: 0.8

  # ── SUITE C: Multi-call retry ─────────────────────────────────────────────────
  # Queries where the first search is expected to be thin; agent should retry.

  - description: "Retry — vague query 'greeting' leads to at least 1 search call with result"
    vars:
      query: "greeting"
    assert:
      - $ref: "#/assertionTemplates/didSearch"
      - type: icontains
        value: "namaskara"

  - description: "Retry — numbers query reaches 1-10 list"
    vars:
      query: "Count to ten in Kodava"
    assert:
      - $ref: "#/assertionTemplates/didSearch"
      - type: icontains
        value: "ondh"
      - type: icontains
        value: "pathth"

  # ── SUITE D: Corpus guard — agent must not fabricate ─────────────────────────

  - description: "Guard — unknown word after exhausting search calls"
    vars:
      query: "What is the Kodava word for helicopter?"
    assert:
      - $ref: "#/assertionTemplates/corpusGuard"

  - description: "Guard — agent does not borrow Hindi words"
    vars:
      query: "What is the Kodava word for hospital?"
    assert:
      - $ref: "#/assertionTemplates/corpusGuard"
      - type: llm-rubric
        value: "Response does not substitute a Hindi, Urdu, or Kannada loanword as authentic Kodava vocabulary"
        threshold: 0.9

  # ── SUITE E: Answer faithfulness after multi-call retrieval ──────────────────

  - description: "Faithfulness — market sentence grounded in retrieved docs"
    vars:
      query: "How do I say 'I went to the market' in Kodava?"
    assert:
      - $ref: "#/assertionTemplates/didSearch"
      - type: icontains
        value: "sante"
      - type: context-faithfulness
        contextTransform: "JSON.stringify(context.metadata?.context ?? [])"
        threshold: 0.6

  - description: "Faithfulness — house answer grounded in corpus"
    vars:
      query: "Tell me about the word for house in Kodava"
    assert:
      - $ref: "#/assertionTemplates/didSearch"
      - type: icontains
        value: "mane"
      - $ref: "#/assertionTemplates/hasBold"

  # ── SUITE F: Script rendering after agent retrieval ──────────────────────────

  - description: "Script — Kannada script present after agent retrieves mane"
    vars:
      query: "What is the Kodava word for house? Show me the Kannada script."
    assert:
      - $ref: "#/assertionTemplates/didSearch"
      - $ref: "#/assertionTemplates/hasKannada"
      - type: icontains
        value: "mane"

  - description: "Script — Devanagari present for days-of-week request"
    vars:
      query: "Days of the week in Kodava, in Hindi script"
    assert:
      - $ref: "#/assertionTemplates/didSearch"
      - $ref: "#/assertionTemplates/hasDevanagari"
      - type: icontains
        value: "naaraache"

  # ── SUITE G: Keyword guard — no broadening on direct-keyword 0-hit queries ───
  # These tests verify the "Do NOT reformulate" rule in search_agent.md.
  # A direct English keyword that returns 0 hits is a corpus gap, not a
  # query problem — the agent must stop after 1 call and report the gap.

  - description: "Keyword guard — helicopter: exactly 1 search call, no broadening"
    vars:
      query: "helicopter"
    assert:
      - type: javascript
        value: "context.metadata?.search_calls?.length === 1"
      - $ref: "#/assertionTemplates/corpusGuard"
      - type: llm-rubric
        value: "Response does not mention gaadi, vehicle, aircraft, or any Kodava word as a translation for helicopter"
        threshold: 0.9

  - description: "Keyword guard — internet: exactly 1 search call, no broadening"
    vars:
      query: "internet"
    assert:
      - type: javascript
        value: "context.metadata?.search_calls?.length === 1"
      - $ref: "#/assertionTemplates/corpusGuard"

  - description: "Keyword guard — hospital: 1 call, finds aaspathre directly"
    vars:
      query: "hospital"
    assert:
      - type: javascript
        value: "context.metadata?.search_calls?.length === 1"
      - type: icontains
        value: "aaspathre"

  # ── SUITE H: Reformulation trigger — natural-language queries must reformulate ─
  # The agent may reformulate on the first call itself (pre-emptive) or make a
  # second call — either way the first search_call query must differ from the
  # raw natural-language input and the answer must be correct.

  - description: "Reformulation trigger — 'how do I say good morning' finds polaaka"
    vars:
      query: "how do I say good morning in Kodava"
    assert:
      - $ref: "#/assertionTemplates/didSearch"
      - type: icontains
        value: "polaaka"
      - type: javascript
        # First call must NOT be the raw sentence — it must be a keyword form
        value: "!context.metadata?.search_calls?.[0]?.query?.startsWith('how do I')"

  - description: "Reformulation trigger — 'what is the Kodava word for water' finds neer"
    vars:
      query: "what is the Kodava word for water"
    assert:
      - $ref: "#/assertionTemplates/didSearch"
      - type: llm-rubric
        value: "Response gives the Kodava word for water — neer or niir"
        threshold: 0.9
      - type: javascript
        # First call must NOT be the raw sentence — it must be a keyword form
        value: "!context.metadata?.search_calls?.[0]?.query?.startsWith('what is')"

  # ── SUITE I: Call-limit cap — never exceeds 2 calls ──────────────────────────

  - description: "Call cap — complex sentence query stays within 2 calls"
    vars:
      query: "How do I say I went to the market yesterday in Kodava?"
    assert:
      - type: javascript
        value: "context.metadata?.search_calls?.length <= 2"
      - type: icontains
        value: "sante"
