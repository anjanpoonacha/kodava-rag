# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# Kodava RAG — SearchingExpert agent eval
#
# Usage:
#   promptfoo eval --config promptfooconfig.agent.yaml
#   promptfoo eval --config promptfooconfig.agent.yaml --filter-pattern "morning"

description: "Kodava RAG — SearchingExpert agent"

evaluateOptions:
  maxConcurrency: 4

providers:
  - file://configs/agent-provider.yaml

prompts:
  - "{{query}}"

defaultTest: file://configs/grader.yaml

tests:
  - file://tests/agent/reformulation.yaml
  - file://tests/agent/collection_targeting.yaml
  - file://tests/agent/retry_and_limits.yaml
  - file://tests/agent/corpus_guard.yaml
  - file://tests/agent/faithfulness.yaml
