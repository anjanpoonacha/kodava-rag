# Script rendering tests — Kannada / Devanagari Unicode assertions.
# Validates the phoneme map and Kannada-script BM25 index query paths.

- description: "script — LL phoneme maps to Kannada ಳ"
  vars:
    query: "How is the LL sound written in Kannada script?"
  assert:
    - type: icontains
      value: "ಳ"

- description: "script — Kannada-script query ಮನೆ ಎಂದರೇನು resolves to mane"
  vars:
    query: "ಮನೆ ಎಂದರೇನು?"
  assert:
    - type: icontains
      value: "mane"
    - type: regex
      value: '[\u0C80-\u0CFF]'

- description: "script — Kannada BM25 query ಮನೆ ಅಂದ್ರೆ ಏನು resolves to mane"
  vars:
    query: "ಮನೆ ಅಂದ್ರೆ ಏನು Kodava ಅಲ್ಲಿ?"
  assert:
    - type: icontains
      value: "mane"
    - type: regex
      value: '[\u0C80-\u0CFF]'

- description: "script — LL phoneme: Kannada ಳ in answer for phoneme map query"
  vars:
    query: "What does the phoneme LL map to in Kannada script?"
  assert:
    - type: icontains
      value: "ಳ"

# ── Word-final short-e matra ೆ regression tests ──────────────────────────────
# These guard against the bug where word-final 'e' was silently rendered as
# the inherent ಅ (bare consonant) instead of the explicit short-e matra ೆ.

- description: "script — katthe (donkey) Kannada ends in short-e matra ೆ"
  vars:
    query: "How do you write katthe (donkey) in Kannada script?"
  assert:
    - type: icontains
      value: "ಕತ್ತೆ"

- description: "script — kudure (horse) Kannada ends in short-e matra ೆ"
  vars:
    query: "Write kudure (horse) in Kannada script"
  assert:
    - type: icontains
      value: "ಕುದುರೆ"

- description: "script — mane (house) Kannada ends in short-e matra ೆ"
  vars:
    query: "How is mane (house) written in Kannada script?"
  assert:
    - type: icontains
      value: "ಮನೆ"
