# Cross-collection fanout — search_all must pull from multiple collections.
# Also covers the ennane + adige regression (id-based pin test).

- description: "retrieval — search_all returns ≥3 results for sentence query"
  vars:
    query: "naan sante'k poanê"
  assert:
    - type: javascript
      value: "JSON.parse(output).length >= 3"
    - type: icontains
      value: "sante"

# The agent reformulates "Translate: How to cook" into two separate keyword calls:
#   call 1: "cook cooking"  → adige maaduva (94fe4723)
#   call 2: "how manner"    → ennane variants (45d20af1, dbc00acf, etc.)
# These tests verify search_all handles each reformulated keyword correctly.
# The two-call strategy is enforced at the agent level (see tests/agent/).

- description: "retrieval — cook cooking: adige maaduva retrieved"
  vars:
    query: "cook cooking"
  assert:
    - type: javascript
      value: |
        const ctx = JSON.parse(output);
        const ids = ctx.map(d => d.id);
        const hasAdige = ids.includes('94fe4723');
        if (!hasAdige) throw new Error('adige maaduva (94fe4723) missing from context');
        return true;

- description: "retrieval — how manner: ennane retrieved"
  vars:
    query: "how manner"
  assert:
    - type: javascript
      value: |
        const ctx = JSON.parse(output);
        const hasEnnane = ctx.some(d =>
          (d.kodava || '').toLowerCase().includes('ennane') ||
          (d.english || '').toLowerCase().includes('how')
        );
        if (!hasEnnane) throw new Error('no ennane/how entry in context');
        return true;
