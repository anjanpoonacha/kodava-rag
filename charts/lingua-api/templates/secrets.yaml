# Secrets are pre-created outside Helm and referenced by name only.
# See values.yaml secrets.* fields for the expected secret names.
# Do not manage secrets here — create them with kubectl before first deploy:
#
#   kubectl create secret generic lingua-api-secrets \
#     --from-literal=ANTHROPIC_API_KEY=<key> -n <namespace>
#   kubectl create secret generic aicore-binding \
#     --from-literal=credentials='<json>' -n <namespace>
