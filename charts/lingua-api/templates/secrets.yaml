{{- if .Values.secrets.proxyApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: lingua-api-secrets
  namespace: {{ .Values.namespace }}
  labels:
    app: lingua-api
    app.kubernetes.io/managed-by: Helm
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.proxyApiKey | quote }}
{{- end }}
{{- if .Values.secrets.aicoreCredentials }}
---
apiVersion: v1
kind: Secret
metadata:
  name: aicore-binding
  namespace: {{ .Values.namespace }}
  labels:
    app: lingua-api
    app.kubernetes.io/managed-by: Helm
type: Opaque
stringData:
  credentials: {{ .Values.secrets.aicoreCredentials | quote }}
{{- end }}
