apiVersion: gateway.kyma-project.io/v2
kind: APIRule
metadata:
  name: lingua-api
  namespace: {{ include "lingua-api.namespace" . }}
  labels:
    app: lingua-api
    app.kubernetes.io/managed-by: Helm
spec:
  gateway: kyma-system/kyma-gateway
  hosts:
    - {{ .Values.app.host }}
  service:
    name: lingua-api
    port: {{ .Values.approuter.port }}
  rules:
    - path: /health
      methods: ["GET"]
      noAuth: true
      service:
        name: lingua-api
        port: {{ .Values.app.port }}
    # Bypass the approuter for the SSE streaming endpoint.
    # The approuter buffers responses, which breaks text/event-stream.
    # Route directly to the backend so chunked transfer encoding is preserved.
    - path: /agent/stream
      methods: ["POST", "OPTIONS"]
      noAuth: true
      service:
        name: lingua-api
        port: {{ .Values.app.port }}
    - path: /
      methods: ["GET"]
      noAuth: true
    - path: /{**}
      methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
      noAuth: true
